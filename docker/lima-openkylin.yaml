# Lima VM配置: openKylin eBPF开发环境
# 使用方式:
#   1. 先创建qcow2磁盘并安装openKylin(见 scripts/install-openkylin-vm.sh)
#   2. limactl start docker/lima-openkylin.yaml
#   3. limactl shell openkylin

vmType: qemu
arch: aarch64

# 安装完系统后，将disk指向安装好的qcow2
# 初次安装时使用ISO，安装完成后切换到disk
images:
  # 方案A: 从已安装的磁盘镜像启动(安装完成后使用)
  - location: "/Users/ljz/.lima/openkylin/openkylin.qcow2"
    arch: aarch64

# 如果还没安装，先用ISO安装(需要单独的QEMU安装流程)
# 安装完成后注释掉上面的images，取消注释下面的:
# images:
#   - location: "/Users/ljz/.lima/openkylin/openkylin-base.qcow2"
#     arch: aarch64

cpus: 4
memory: 8GiB
disk: 50GiB

mounts:
  - location: "/Users/ljz/ljz-local/contest"
    writable: true
  - location: "/tmp/lima"
    writable: true

mountType: virtiofs

ssh:
  forwardAgent: true
  loadDotSSHPubKeys: true

# openKylin没有cloud-init，需要用provision脚本安装eBPF环境
provision:
  - mode: system
    script: |
      #!/bin/bash
      set -e
      echo ">>> 安装eBPF开发工具链 (openKylin)..."

      # openKylin基于Debian，使用apt
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq 2>/dev/null || yum update -y 2>/dev/null || true

      # 尝试apt (openKylin 2.0+ 基于Debian)
      if command -v apt-get &>/dev/null; then
        apt-get install -y \
          build-essential clang llvm llvm-dev \
          libbpf-dev linux-headers-$(uname -r) \
          bpfcc-tools python3-bpfcc libbpfcc-dev \
          bpftool pkg-config \
          python3 python3-pip python3-venv \
          stress-ng fio sysbench \
          openssh-server curl wget git \
          2>/dev/null || true
      fi

      # 如果apt失败，尝试yum/dnf (某些openKylin版本)
      if command -v dnf &>/dev/null; then
        dnf install -y \
          clang llvm llvm-devel \
          libbpf-devel kernel-devel-$(uname -r) \
          bpfcc-tools python3-bpfcc \
          bpftool pkg-config \
          python3 python3-pip \
          stress-ng fio sysbench \
          openssh-server curl wget git \
          2>/dev/null || true
      fi

      echo ">>> 验证eBPF支持..."
      echo "内核版本: $(uname -r)"
      test -f /sys/kernel/btf/vmlinux && echo "BTF支持: 可用" || echo "BTF支持: 不可用"

      echo ">>> 配置SSH..."
      systemctl enable ssh 2>/dev/null || systemctl enable sshd 2>/dev/null || true
      systemctl start ssh 2>/dev/null || systemctl start sshd 2>/dev/null || true

      echo ">>> 环境搭建完成"

  - mode: user
    script: |
      #!/bin/bash
      set -e
      echo ">>> 配置Python虚拟环境..."
      python3 -m venv ~/ebpf-venv
      source ~/ebpf-venv/bin/activate
      pip install --quiet pyyaml rich
      echo ">>> Python环境就绪"

# 端口转发
portForwards:
  - guestPort: 22
    hostPort: 0
    proto: tcp