# eBPF Diagnoser 默认配置
# 所有阈值均可通过 --threshold key=value 覆盖

# 异常检测阈值
thresholds:
  # CPU
  cpu_usage_high: 90.0           # CPU使用率告警阈值(%)
  cpu_usage_warn: 70.0           # CPU使用率警告阈值(%)
  ctx_switch_high: 50000.0       # 上下文切换率告警(次/分钟)
  sched_delay_high: 50.0         # 调度延迟告警(ms)
  runqueue_high: 4.0             # 运行队列长度(倍CPU核数)

  # I/O
  io_p99_high: 50.0              # P99延迟告警(ms)
  io_queue_depth_high: 32.0      # 队列深度告警
  io_await_high: 30.0            # 平均等待时间告警(ms)

  # 内存
  mem_available_low: 10.0        # 可用内存告警(%)
  mem_major_fault_high: 100.0    # major fault率告警(次/秒)
  kswapd_active_high: 50.0       # kswapd活跃度告警(%)

  # 锁
  lock_wait_high: 10.0           # 锁等待时间告警(ms)
  lock_contention_high: 50.0     # 锁争用率告警(%)

  # 系统调用
  syscall_freq_high: 5.0         # syscall频率告警(相对基线倍数)
  syscall_slow_ms: 100.0         # 慢syscall告警阈值(ms)

  # 通用
  anomaly_window: 3              # 异常需持续的窗口数
  baseline_window: 30            # 基线计算窗口(秒)
  baseline_sigma: 3.0            # 动态基线的sigma倍数

# 探针配置
probe:
  # 采样率 (1/N, 0表示不采样全部采集)
  cpu_sample_rate: 1             # CPU探针采样率
  io_sample_rate: 1              # I/O探针采样率
  mem_sample_rate: 1             # 内存探针采样率
  lock_sample_rate: 10           # 锁探针采样率(高频,默认1/10)
  syscall_sample_rate: 100       # 系统调用采样率(极高频,默认1/100)

  # 栈回溯(性能开销较大,默认关闭)
  enable_stack_trace: false
  stack_trace_limit: 10

  # 过滤(空=全部)
  pid_filter: []
  comm_filter: []

# 输出配置
output:
  format: table                  # 输出格式: json, table, md
  file: null                     # 输出文件路径(null=stdout)
  include_evidence_chain: true   # 是否包含证据链
  include_recommendations: true  # 是否包含建议
  timestamp_format: "%Y-%m-%dT%H:%M:%S%z"