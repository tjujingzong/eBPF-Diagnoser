[build-system]
requires = ["setuptools>=68.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "ebpf-diagnoser"
version = "1.0.0"
description = "基于eBPF的轻量级系统异常观测与根因定位工具"
readme = "README.md"
license = {text = "Apache-2.0"}
requires-python = ">=3.9"
dependencies = [
    "bcc>=0.27.0",
    "pyyaml>=6.0",
    "rich>=13.0",
]

[project.scripts]
ebpf-diagnoser = "src.main:main"

[tool.setuptools.packages.find]
where = ["."]
include = ["src*"]